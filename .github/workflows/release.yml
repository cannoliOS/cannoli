name: Build Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version number (e.g. 1.0.0)
        required: true
      branch:
        description: Branch to build from
        required: true
        default: main
      message:
        description: Release notes
        required: true
      prerelease:
        description: Mark as pre-release
        type: boolean
        default: true

env:
  BUILDBOT: https://buildbot.libretro.com/nightly/android/latest
  CORES: >-
    atari800 bluemsx dosbox_pure fceumm freeintv gambatte genesis_plus_gx
    handy mednafen_ngp mednafen_pce_fast mednafen_pcfx mednafen_vb
    mednafen_wswan mgba mupen64plus_next_gles3 nestopia pcsx_rearmed
    picodrive pokemini prosystem snes9x stella swanstation vecx virtualjaguar

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Download libretro cores
        run: |
          for arch in arm64-v8a armeabi-v7a; do
            dir="app/src/main/jniLibs/${arch}"
            mkdir -p "$dir"
            for core in $CORES; do
              name="${core}_libretro_android.so"
              echo "Downloading ${arch}/${name}"
              curl -sL "${BUILDBOT}/${arch}/${name}.zip" -o /tmp/core.zip
              unzip -o -q /tmp/core.zip -d "$dir"
              rm /tmp/core.zip
            done
          done

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - uses: android-actions/setup-android@v3

      - uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27c

      - uses: oven-sh/setup-bun@v2

      - name: Build Kitchen frontend
        run: |
          git clone https://github.com/cannoliOS/kitchen.git /tmp/kitchen
          cd /tmp/kitchen
          bun install --frozen-lockfile
          bun run build
          rm -rf app/src/main/assets/kitchen
          cp -r /tmp/kitchen/dist app/src/main/assets/kitchen

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/release.keystore

      - name: Build release APK
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=${{ github.workspace }}/app/release.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: Get version info
        id: version
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "tag=v${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          echo "apk_name=cannoli-${{ inputs.version }}-${SHORT_SHA}.apk" >> "$GITHUB_OUTPUT"

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/release/app-release.apk \
             app/build/outputs/apk/release/${{ steps.version.outputs.apk_name }}

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body: ${{ inputs.message }}
          prerelease: ${{ inputs.prerelease }}
          target_commitish: ${{ inputs.branch }}
          files: app/build/outputs/apk/release/${{ steps.version.outputs.apk_name }}
